<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LeetSmith</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ONBOARDING / SETUP VIEW -->
  <div id="onboardingView" class="view" style="display: none;">
    <div class="header" style="border: none; padding-bottom: 0;">
      <img src="/assets/logo2.png" alt="LeetSmith Header Logo" class="logo-img" onerror="this.style.display='none'">
      <h1>LeetSmith</h1>
      <p>Welcome to the Forge. Link your GitHub account to begin tempering your solutions.</p>
    </div>

    <div class="form-group" style="margin-top: 8px;">
      <button id="gitAuthBtn">⛓️ Connect to GitHub</button>
      <div id="authSuccessMsg" style="display:none; color: var(--success); font-size: 13px; font-weight:700; text-align:center; padding: 6px; border: 1px solid var(--success); border-radius: 4px;">✅ GitHub Linked</div>
    </div>

    <div id="repoSetupSection" style="opacity: 0.5; pointer-events: none; transition: opacity 0.3s; margin-top: 12px;">
      <div class="form-group">
        <label for="githubRepoUrl">Target Repository URL</label>
        <input type="text" id="githubRepoUrl" placeholder="https://github.com/username/repo">
      </div>
      
      <div class="form-group">
        <label for="customFolder">Custom Folder Target (Optional)</label>
        <input type="text" id="customFolder" placeholder="e.g. /Arrays">
        <span class="help-text">Leave blank to sort by Problem Difficulty</span>
      </div>

      <button id="finishSetupBtn" style="margin-top: 8px;">Complete Setup</button>
      <button id="backToMainBtn" style="margin-top: 8px; display: none;">Back to Forge</button>
    </div>
  </div>

  <!-- MAIN SYNC VIEW -->
  <div id="mainView" class="view" style="display: none;">
    <div class="header" style="border: none;">
      <img src="/assets/logo2.png" alt="LeetSmith Logo" style="width: 32px; border-radius: 4px;" onerror="this.style.display='none'">
      <h1 style="font-size: 1.2rem; margin-bottom: 0;">LeetSmith</h1>
    </div>

    <!-- The Forge Stats -->
    <div id="forgeStatsContainer" style="display: none;">
      <div class="forge-dashboard">
        <div class="streak-header">
          <span class="stat-label">Forge Flame</span>
          <span class="stat-value" id="statStreak">- Days</span>
        </div>
        
        <div class="center-flame">
          <span style="font-size: 48px;">🔥</span>
        </div>

        <div class="stats-grid">
          <div class="stat-item"><span class="stat-value" id="statEasy">-</span><span class="stat-label">🥉 Copper</span></div>
          <div class="stat-item"><span class="stat-value" id="statMedium">-</span><span class="stat-label">🥈 Steel</span></div>
          <div class="stat-item"><span class="stat-value" id="statHard">-</span><span class="stat-label">🥇 Obsidian</span></div>
          <div class="stat-item"><span class="stat-value" id="statTotal">-</span><span class="stat-label">Items Forged</span></div>
        </div>
      </div>
    </div>
    <div id="forgeStatsLoading" style="text-align:center; font-size:11px; color:var(--text-muted); margin: 4px 0;">Stoking the forge...</div>

    <button id="syncNowBtn">Forge Current Problem</button>
    <button id="openSettingsBtn" style="margin-top: -6px; opacity: 0.9;">⚙️ Reconfigure</button>
  </div>

  <!-- GLOBAL STATUS MESSAGE -->
  <div id="statusMessage" class="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
