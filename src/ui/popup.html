<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LeetSmith</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1><span style="font-size: 20px;">⚒️</span> LeetSmith</h1>
    <p>Forge your solutions into GitHub</p>
  </div>

  <!-- MAIN SYNC VIEW -->
  <div id="mainView" class="view">
    <button id="syncNowBtn">Sync Current Problem</button>
    <button class="secondary" id="openSettingsBtn">⚙️ Configuration</button>
  </div>

  <!-- SETTINGS CONFIG VIEW -->
  <div id="settingsView" class="view" style="display: none;">
    
    <div class="form-group">
      <label>GitHub Authentication</label>
      <button class="secondary" id="gitAuthBtn" style="color: var(--primary); border-color: var(--primary);">⛓️ Connect to GitHub</button>
      <div id="authSuccessMsg" style="display:none; color: var(--success); font-size: 13px; font-weight:600; text-align:center; padding: 4px;">✅ Account Linked</div>
    </div>

    <div class="form-group">
      <label for="githubRepoUrl">GitHub Repository URL *</label>
      <input type="text" id="githubRepoUrl" placeholder="https://github.com/username/repo">
    </div>

    <div class="form-group">
      <label for="customFolder">Custom Folder Target</label>
      <input type="text" id="customFolder" placeholder="e.g. /Arrays">
      <span class="help-text">Leave blank to use Problem Difficulty</span>
    </div>

    <div style="display: flex; gap: 8px; margin-top: 4px;">
      <button class="secondary" id="backBtn" style="flex: 1;">Cancel</button>
      <button id="saveBtn" style="flex: 2;">Save</button>
    </div>
  </div>

  <!-- GLOBAL STATUS MESSAGE -->
  <div id="statusMessage" class="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
